name: Export App Secrets (one-time, delete after use)
on: workflow_dispatch
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - run: echo "${{ secrets.APP_PRIVATE_KEY }}" > private-key.pem
      - uses: actions/upload-artifact@v4
        with:
          name: app-private-key
          path: private-key.pem
          retention-days: 1
